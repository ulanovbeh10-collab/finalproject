<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Добавить обзор — BiteRank</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #e0e0e0; margin: 30px; }
        .btn-back { background: #333; color: #fff; padding: 8px 15px; border-radius: 6px; text-decoration: none; display: inline-block; margin-bottom: 20px; }
        .form-card { background: #1e1e1e; padding: 25px; border-radius: 12px; max-width: 500px; border: 1px solid #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #ff9800; }
        input, select, textarea { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #444; background: #2a2a2a; color: #fff; box-sizing: border-box; }
        button { background: #ff9800; color: #000; padding: 12px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; font-size: 16px; }
        button:hover { background: #e68a00; }
    </style>
</head>
<body>

    <a href="/" class="btn-back">← На главную</a>

    <div class="form-card">
        <h2>➕ Добавить новый обзор</h2>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {% for field in form %}
                <div class="form-group">
                    <label>{{ field.label }}</label>
                    {{ field }}
                </div>
            {% endfor %}
            <button type="submit">Опубликовать обзор 🚀</button>
        </form>
    </div>

</body>
</html>
