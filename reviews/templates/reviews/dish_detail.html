<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ dish.title }} — BiteRank</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #e0e0e0; margin: 30px; }
        .btn-back { background: #333; color: #fff; padding: 8px 15px; border-radius: 6px; text-decoration: none; display: inline-block; margin-bottom: 20px; }
        .container { max-width: 700px; background: #1e1e1e; padding: 25px; border-radius: 12px; border: 1px solid #333; }
        .dish-img { width: 100%; max-height: 400px; object-fit: cover; border-radius: 10px; margin-bottom: 20px; }
        .rating { color: #ff9800; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <a href="/" class="btn-back">← На главную</a>

    <div class="container">
        {% if dish.image %}
            <img src="{{ dish.image.url }}" alt="{{ dish.title }}" class="dish-img">
        {% endif %}

        <h1>{{ dish.title }}</h1>
        <p>📍 <strong>Заведение:</strong> {{ dish.place }}</p>
        <p class="rating">⭐ Оценка: {{ dish.rating }}/5</p>
        <p>📝 {{ dish.description }}</p>
        <small style="color: #777;">Опубликовал: {{ dish.author.username }}</small>
    </div>

</body>
</html>
