<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой профиль — BiteRank</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #e0e0e0; margin: 30px; }
        .btn { background: #333; color: #fff; padding: 8px 15px; border-radius: 6px; text-decoration: none; display: inline-block; margin-bottom: 20px; }
        .profile-card { background: #1e1e1e; padding: 25px; border-radius: 12px; border: 1px solid #333; max-width: 500px; }
        .badge { background: #ff9800; color: #000; padding: 6px 14px; border-radius: 15px; font-weight: bold; margin-top: 10px; display: inline-block; }
    </style>
</head>
<body>

    <a href="/" class="btn">← На главную</a>

    <div class="profile-card">
        <h2>👤 Профиль: {{ profile.user.username }}</h2>

        <p>Моих опубликованных обзоров: <strong>{{ profile.get_review_count }}</strong></p>

        <div class="badge">
            🏆 Ачивка:
            {% if profile.get_review_count >= 5 %}
                «Главный Гуру Еды 👑»
            {% elif profile.get_review_count >= 1 %}
                «Первый кусь 🍕»
            {% else %}
                «Голодный Новичок 🥣»
            {% endif %}
        </div>
    </div>

</body>
</html>
